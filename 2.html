<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --sky1:#0a1628;--sky2:#112244;--sky3:#1a3060;
      --card:#ffffff0f;--cardborder:#ffffff18;
      --txt:#f0f4ff;--txt2:#a0b4d0;--accent:#60c8ff;
    }
    body{
      font-family:'DM Sans',sans-serif;
      background:linear-gradient(160deg,var(--sky1) 0%,var(--sky2) 50%,var(--sky3) 100%);
      color:var(--txt);
      min-height:100vh;
    }
    .app{
      max-width:640px;
      margin:0 auto;
      padding:2.5rem 1.5rem 3rem;
      position:relative;
      overflow:hidden;
      min-height:100vh;
    }
    .stars{position:fixed;inset:0;pointer-events:none;z-index:0}
    .star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle 3s infinite}
    @keyframes twinkle{0%,100%{opacity:.2}50%{opacity:.9}}
    h1{
      font-family:'DM Serif Display',serif;
      font-size:2rem;
      font-weight:400;
      text-align:center;
      margin-bottom:2rem;
      position:relative;
      z-index:10;
      letter-spacing:-0.5px;
    }
    h1 span{color:var(--accent)}
    .search-row{
      display:flex;gap:10px;margin-bottom:2rem;
      position:relative;z-index:10;
    }
    .search-wrap{flex:1;position:relative}
    .search-wrap input{
      width:100%;background:var(--card);
      border:1px solid var(--cardborder);
      border-radius:50px;padding:14px 22px;
      color:var(--txt);font-size:15px;
      font-family:'DM Sans',sans-serif;
      outline:none;transition:.2s;
      backdrop-filter:blur(10px);
    }
    .search-wrap input:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px #60c8ff22;
    }
    .search-wrap input::placeholder{color:var(--txt2)}
    .search-btn{
      background:var(--accent);color:#0a1628;
      border:none;border-radius:50px;
      padding:14px 24px;font-size:15px;
      font-weight:500;cursor:pointer;
      font-family:'DM Sans',sans-serif;
      transition:.15s;white-space:nowrap;
    }
    .search-btn:hover{background:#88d8ff;transform:scale(1.02)}
    .search-btn:active{transform:scale(0.98)}
    .loading{
      text-align:center;padding:3rem 1rem;
      color:var(--txt2);font-size:14px;
      position:relative;z-index:10;
    }
    .spinner{
      width:36px;height:36px;
      border:2px solid var(--cardborder);
      border-top-color:var(--accent);
      border-radius:50%;
      animation:spin 0.8s linear infinite;
      margin:0 auto 1rem;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .weather-card{
      background:var(--card);
      border:1px solid var(--cardborder);
      border-radius:24px;padding:2rem;
      backdrop-filter:blur(20px);
      animation:fadeUp .4s ease;
      position:relative;z-index:10;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .city-name{
      font-family:'DM Serif Display',serif;
      font-size:2.4rem;font-weight:400;
      letter-spacing:-0.5px;margin-bottom:4px;
    }
    .city-sub{
      color:var(--txt2);font-size:13px;
      margin-bottom:1.5rem;letter-spacing:.5px;
      text-transform:uppercase;
    }
    .main-temp-row{
      display:flex;align-items:flex-start;
      gap:1.5rem;margin-bottom:1.5rem;
    }
    .big-temp{
      font-family:'DM Serif Display',serif;
      font-size:5rem;line-height:1;color:var(--txt);
    }
    .temp-unit{font-size:2rem;color:var(--txt2);margin-top:.5rem}
    .condition-block{display:flex;flex-direction:column;justify-content:center;gap:6px}
    .condition-emoji{font-size:2.5rem;line-height:1}
    .condition-text{font-size:1rem;color:var(--txt2);font-weight:300;font-style:italic;font-family:'DM Serif Display',serif}
    .feels-like{font-size:12px;color:var(--txt2);margin-top:2px}
    .divider{height:1px;background:var(--cardborder);margin:1.5rem 0}
    .stats-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
      gap:12px;margin-bottom:1.5rem;
    }
    .stat{
      background:#ffffff08;border:1px solid var(--cardborder);
      border-radius:16px;padding:1rem;text-align:center;
    }
    .stat-icon{font-size:1.4rem;margin-bottom:6px}
    .stat-val{font-size:1.1rem;font-weight:500;color:var(--txt);margin-bottom:2px}
    .stat-label{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.8px}
    .forecast-title{
      font-size:11px;color:var(--txt2);
      text-transform:uppercase;letter-spacing:1px;
      margin-bottom:1rem;
    }
    .forecast-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px}
    .forecast-row::-webkit-scrollbar{height:3px}
    .forecast-row::-webkit-scrollbar-thumb{background:var(--cardborder);border-radius:3px}
    .fc-day{
      background:#ffffff08;border:1px solid var(--cardborder);
      border-radius:14px;padding:.75rem 1rem;
      text-align:center;flex:1;min-width:70px;
    }
    .fc-day-name{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
    .fc-icon{font-size:1.3rem;margin-bottom:6px}
    .fc-temp{font-size:14px;font-weight:500}
    .fc-low{font-size:11px;color:var(--txt2);margin-top:2px}
    .ai-summary{
      margin-top:1.5rem;background:#60c8ff10;
      border:1px solid #60c8ff33;border-radius:16px;
      padding:1.25rem;font-size:13.5px;line-height:1.7;
      color:var(--txt2);font-style:italic;
      font-family:'DM Serif Display',serif;
      position:relative;
    }
    .ai-tag{
      position:absolute;top:-10px;left:16px;
      background:var(--accent);color:#0a1628;
      font-size:10px;font-weight:500;
      padding:2px 10px;border-radius:20px;
      font-family:'DM Sans',sans-serif;
      font-style:normal;letter-spacing:.5px;
      text-transform:uppercase;
    }
    .error-box{
      background:#ff444420;border:1px solid #ff444455;
      border-radius:16px;padding:1.25rem;
      color:#ff9999;font-size:14px;text-align:center;
      margin-top:1rem;position:relative;z-index:10;
    }
    .hint{
      text-align:center;color:var(--txt2);
      font-size:13.5px;padding:3rem 1rem;
      line-height:1.8;font-family:'DM Serif Display',serif;
      font-style:italic;position:relative;z-index:10;
    }
    .hint strong{
      color:var(--txt);font-style:normal;
      font-family:'DM Sans',sans-serif;
      font-size:12px;font-weight:400;
      display:block;margin-top:.5rem;
      text-transform:uppercase;letter-spacing:1px;
    }
    /* NOTE: The AI summary uses the Anthropic API.
       To enable it, add your API key below in the JS section
       where it says: YOUR_ANTHROPIC_API_KEY_HERE
       Get a key at: https://console.anthropic.com
    */
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="app">
    <h1>weather<span>App</span></h1>
    <div class="search-row">
      <div class="search-wrap">
        <input type="text" id="cityInput" placeholder="Search any city... London, Tokyo, Mumbai" autocomplete="off"/>
      </div>
      <button class="search-btn" id="searchBtn">Search</button>
    </div>
    <div id="result">
      <div class="hint">
        Discover the weather anywhere on Earth<br>
       
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // CONFIGURATION
    // Replace with your Anthropic API key to enable AI summaries
    // Get one at: https://console.anthropic.com
    // ============================================================
    const ANTHROPIC_API_KEY = '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';

    // Generate background stars
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*3}s;opacity:${Math.random()*.6+.1}`;
      starsEl.appendChild(s);
    }

    // WMO weather code mappings
    const WMO = {
      0:{label:'Clear sky',icon:'☀️'},
      1:{label:'Mainly clear',icon:'🌤️'},
      2:{label:'Partly cloudy',icon:'⛅'},
      3:{label:'Overcast',icon:'☁️'},
      45:{label:'Foggy',icon:'🌫️'},
      48:{label:'Icy fog',icon:'🌫️'},
      51:{label:'Light drizzle',icon:'🌦️'},
      53:{label:'Moderate drizzle',icon:'🌦️'},
      55:{label:'Heavy drizzle',icon:'🌧️'},
      61:{label:'Light rain',icon:'🌧️'},
      63:{label:'Moderate rain',icon:'🌧️'},
      65:{label:'Heavy rain',icon:'⛈️'},
      71:{label:'Light snow',icon:'🌨️'},
      73:{label:'Moderate snow',icon:'❄️'},
      75:{label:'Heavy snow',icon:'❄️'},
    77:{label:'Snow grains',icon:'🌨️'}, b
      80:{label:'Light showers',icon:'🌦️'},
      81:{label:'Moderate showers',icon:'🌧️'},
      82:{label:'Violent showers',icon:'⛈️'},
      85:{label:'Snow showers',icon:'🌨️'},
      86:{label:'Heavy snow showers',icon:'❄️'},
      95:{label:'Thunderstorm',icon:'⛈️'},
      96:{label:'Thunderstorm w/ hail',icon:'🌩️'},
      99:{label:'Thunderstorm w/ heavy hail',icon:'🌩️'}
    };
    const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    function wmo(code) {
      return WMO[code] || {label:'Unknown',icon:'🌡️'};
    }

    function uvLabel(uv) {
      if (uv <= 2) return {t:'Low',c:'#4caf50'};
      if (uv <= 5) return {t:'Moderate',c:'#ffb347'};
      if (uv <= 7) return {t:'High',c:'#ff7043'};
      if (uv <= 10) return {t:'Very High',c:'#c84040'};
      return {t:'Extreme',c:'#9c27b0'};
    }

    // Geocode city name → lat/lon using Open-Meteo geocoding API (free, no key needed)
    async function geocode(city) {
      const res = await fetch(
        `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`
      );
      const data = await res.json();
      if (!data.results || !data.results.length) throw new Error('City not found');
      return data.results[0];
    }

    // Fetch weather data from Open-Meteo (free, no key needed)
    async function getWeather(lat, lon) {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,uv_index&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=6`;
      const res = await fetch(url);
      return await res.json();
    }

    // Get AI-generated weather summary from Claude (requires API key)
    async function getAISummary(city, temp, condition, humidity, wind) {
      if (!ANTHROPIC_API_KEY || ANTHROPIC_API_KEY === 'YOUR_ANTHROPIC_API_KEY_HERE') return null;
      const prompt = `You are a poetic weather narrator. In exactly 2 sentences, describe the current weather for ${city}: ${temp}°C, ${condition}, ${humidity}% humidity, wind ${wind} km/h. Make it atmospheric, evocative, and informative. No greetings.`;
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': ANTHROPIC_API_KEY,
          'anthropic-version': '2023-06-01'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 200,
          messages: [{role: 'user', content: prompt}]
        })
      });
      const data = await res.json();
      return data.content?.[0]?.text || null;
    }

    function render(place, w, aiText) {
      const c = w.current;
      const d = w.daily;
      const cond = wmo(c.weather_code);
      const uv = uvLabel(c.uv_index || 0);

      const forecastHTML = d.time.slice(1, 6).map((t, i) => {
        const date = new Date(t);
        const fc = wmo(d.weather_code[i + 1]);
        return `
          <div class="fc-day">
            <div class="fc-day-name">${i === 0 ? 'Tmrw' : DAYS[date.getDay()]}</div>
            <div class="fc-icon">${fc.icon}</div>
            <div class="fc-temp">${Math.round(d.temperature_2m_max[i + 1])}°</div>
            <div class="fc-low">${Math.round(d.temperature_2m_min[i + 1])}°</div>
          </div>`;
      }).join('');

      const aiHTML = aiText
        ? `<div class="ai-summary"><span class="ai-tag">AI Insight</span>${aiText}</div>`
        : '';

      document.getElementById('result').innerHTML = `
        <div class="weather-card">
          <div class="city-name">${place.name}</div>
          <div class="city-sub">${[place.admin1, place.country].filter(Boolean).join(' · ')}</div>
          <div class="main-temp-row">
            <div>
              <div class="big-temp">${Math.round(c.temperature_2m)}<span class="temp-unit">°C</span></div>
            </div>
            <div class="condition-block">
              <div class="condition-emoji">${cond.icon}</div>
              <div class="condition-text">${cond.label}</div>
              <div class="feels-like">Feels like ${Math.round(c.apparent_temperature)}°C</div>
            </div>
          </div>
          <div class="stats-grid">
            <div class="stat">
              <div class="stat-icon">💧</div>
              <div class="stat-val">${c.relative_humidity_2m}%</div>
              <div class="stat-label">Humidity</div>
            </div>
            <div class="stat">
              <div class="stat-icon">💨</div>
              <div class="stat-val">${Math.round(c.wind_speed_10m)}</div>
              <div class="stat-label">km/h Wind</div>
            </div>
            <div class="stat">
              <div class="stat-icon">🌡️</div>
              <div class="stat-val">${Math.round(d.temperature_2m_max[0])}° / ${Math.round(d.temperature_2m_min[0])}°</div>
              <div class="stat-label">High / Low</div>
            </div>
            <div class="stat">
              <div class="stat-icon">🔆</div>
              <div class="stat-val" style="color:${uv.c}">${uv.t}</div>
              <div class="stat-label">UV Index</div>
            </div>
          </div>
          <div class="forecast-title">5-Day Forecast</div>
          <div class="forecast-row">${forecastHTML}</div>
          ${aiHTML}
        </div>`;
    }

    async function search() {
      const city = document.getElementById('cityInput').value.trim();
      if (!city) return;

      const resultEl = document.getElementById('result');
      resultEl.innerHTML = `<div class="loading"><div class="spinner"></div>Fetching weather data...</div>`;

      try {
        const place = await geocode(city);
        const weather = await getWeather(place.latitude, place.longitude);
        render(place, weather, '');

        // Fetch AI summary asynchronously and update
        const c = weather.current;
        const cond = wmo(c.weather_code);
        try {
          const ai = await getAISummary(
            place.name,
            Math.round(c.temperature_2m),
            cond.label,
            c.relative_humidity_2m,
            Math.round(c.wind_speed_10m)
          );
          if (ai) render(place, weather, ai);
        } catch (e) {
          // AI summary is optional — silently fail
        }
      } catch (e) {
        resultEl.innerHTML = `<div class="error-box">Could not find weather for "<strong>${city}</strong>". Please try a different city name.</div>`;
      }
    }

    document.getElementById('searchBtn').addEventListener('click', search);
    document.getElementById('cityInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') search();
    });
  </script>
</body>
</html>
